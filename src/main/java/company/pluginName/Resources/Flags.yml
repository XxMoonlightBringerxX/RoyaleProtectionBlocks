Version: 2

#--- How it works
#
# This file will allow you to define which flags are registered on the plugin, which ones
# can be modified by the players and which ones are set by default after creating a new
# protection. All the flags follow the next structure:
#
#     <flag-id>: #1
#       Editable: true #2
#       Hidden: false #3
#       Display-item: #4
#         ...
#       Default-value: "DENY" #5
#       Default-group: "ALL" #6
#       Permission: "protectionblocks.flag.<flag-id>" #7
#       Hide-if-no-permission: false #8
#       Hide-if-no-value: false #9
#
#   #1 ID of the flag to be used, which is the name used on WorldGuard.
#
#   #2 (Optional) If the flag is editable or not by the player. By default it'll be non-editable.
#
#   #3 (Optional) If the flag is hidden or not to the player. Hidden flags can't be modified or seen by
#      players, this setting is intendend for default flags to prevent players from seeing them.
#      By default, flags are shown.
#
#   #4 (Optional) The item to be used on the GUI. It follows the item definition standard*. If there's
#      No item, the flag is not shown up on the GUI, but on the command only.
#
#   #5 (Optional) The default value it'll apply to new protections. The value may vary depending
#      on the flag type, as every flag requires its own type of value. Check the WorldGuard flag information.
#      It's case insensitive. By default, it'll not apply any value.
#
#   #6 (Optional) The default group to apply when applying the flag to new protections or modifying them.
#      The allowed values are: ALL, MEMBERS, OWNERS, NON_MEMBERS, NON_OWNERS. It's case insensitive.
#      By default, it'll use the default group of the flag.
#
#   #7 (Optional) Permission required to be able to modify the flag. By default, it'll not require any permission.
#
#   #8 (Optional) Hide the flag if the player does not have permissions to modify this plag. By default,
#      it's set on false.
#
#   #9 (Optional) Hide the flag if the protection doesn't have any value specified for this flag yet.
#      By default, it's set on false.
#
# * Item standard: (Wiki in progress)
#---

