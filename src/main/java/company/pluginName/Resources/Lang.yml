    - ' '

Inventory: 
  General: 
    Close-name: '&cClose'
    Previous-name: '&ePrevious'
    Next-name: '&eNext'
  Confirm: 
    Title: 'Are you sure?'
    Yes-name: '&aYes'
    No-name: '&cNo'
  Search-players: 
    Title: 'Search a player'
    Player-name: '&e{player}'
    Search-specific-player-name: '&eSearch an specific player'
    Search-specific-player-Info: '&7Type the name of the player you\'re looking for. Type \'cancel\' to
      cancel this action.'
  Protection: 
    Title: '{protection}'
    Owners-name: '&eOwners'
    Members-name: '&eMembers'
    Flags-name: '&eFlags'
    Rename-name: '&eRename protection'
    Type-new-name-Info: '&7Type the new name for the protection. Type \'cancel\' to cancel this
      action.'
    List: 
      Title: 'Protections'
      Protection-name: '&e{protection}'
      Protection-teleport-no-home-lore-line: ' &8- &a&mLeft click&r&a: &7No home set yet'
      Protection-teleport-lore-line: ' &8- &aLeft click: &eTeleport to protection home'
      Protection-edit-lore-line: ' &8- &aRight click: &eManage protection'
    Flags: 
      Title: '{protection} > Flags'
      Flag-name: '&e{flag} &8[&7{value}&8]'
      Allow-value-name: '&aAllow'
      Deny-value-name: '&cDeny'
      String-value-name: '&b{text}'
      String-specify-info: '&7Type the text you want to specify in this flag. Type \'cancel\' to
        cancel this action.'
    Members: 
      Title: '{protection} > Members'
      Member-name: '&e{player}'
      Search-member-name: '&eSearch for a new member'
      Remove-member-lore-line: '&8[&cClick to remove member&8]'
    Owners: 
      Title: '{protection} > Owners'
      Owner-name: '&e{player}'
      Search-owner-name: '&eSearch for a new owner'
      Remove-owner-lore-line: '&8[&cClick to remove owner&8]'
  Protection-blocks: 
    List: 
      Title: 'Protection Blocks'
      Block-lore: 
      - '&0'
      - '&a&oBlock ID: &e{block_id}'
      - '&a&oBlock size: &e{blocks_x}x{blocks_y}x{blocks_z}'
      Block-copy-lore-line: ' &8&o- &aLeft click: &eGet a copy'
      Block-remove-lore-line: ' &8&o- &aRight click: &eRemove the block'

Error: 
  Error: '&cError!'
  Console-denied: '&cYou can\'t use this commands in console!'
  Player-not-found: '&cThe specified player couldn\'t be found!'
  No-item-in-hand: '&cYou must have an item in your hand!'
  Not-a-block: '&cThe item must be a block!'
  Invalid-number: '&cYou specify a valid number!'
  Chat-prompt: 
    Already-prompted: '&cYou\'ve already a pending type operation!'
  Protections: 
    Not-inside-protection: '&cYou\'re not inside any protection!'
    Banned-world: '&cYou can\'t use protection blocks in this world!'
    Not-main-owner: '&cYou\'re not the main owner of this protection!'
    Blocks: 
      Not-found: '&cThere\'s no protection block with this ID!'
  Exception: 
    protection: 
      delete: 
        PermissionDenied: '&cYou aren\'t allowed to delete this protection!'
        SQL: '&cThere was an error trying to delete this protection in the database.
          Please contact with an administrator!'
        Unknown: '&cAn unknown error happened while trying to delete this protection.
          Please contact with an administrator!'
      save: 
        PermissionDenied: '&cYou aren\'t allowed to save this protection!'
        MaxReached: '&cYou\'ve reached the maximum amount of protections allowed!'
        NameInUse: '&cThere\'s already a protection using this name!'
        Overlaps: '&cYou can\'t put protections inside other existing ones!'
        RenamePermissionDenied: '&cYou aren\'t allowed to rename this protection!'
        SQL: '&cThere was an error trying to save this protection in the database.
          Please contact with an administrator!'
        Unknown: '&cAn unknown error happened while trying to save this protection.
          Please contact with an administrator!'
      members: 
        delete: 
          PermissionDenied: '&cYou aren\'t allowed to remove this member!'
          Unknown: '&cAn unknown error happened while trying to remove this member. Please
            contact with an administrator!'
        save: 
          CannotAddProtectionOwner: '&cYou can\'t add the owner of this protection as a member!'
          CannotAddYourself: '&cYou can\'t add yourself as a member!'
          PermissionDenied: '&cYou aren\'t allowed to add members in this protection!'
          Unknown: '&cAn unknown error happened while trying to add this member. Please
            contact with an administrator!'
      owners: 
        delete: 
          CannotDeleteProtectionOwner: '&cYou can\'t remove the owner of this protection from the owners list!'
          PermissionDenied: '&cYou aren\'t allowed to remove this owner!'
          Unknown: '&cAn unknown error happened while trying to remove this owner. Please
            contact with an administrator!'
        save: 
          CannotAddProtectionOwner: '&cYou can\'t add the owner of this protection as an owner!'
          CannotAddYourself: '&cYou can\'t add yourself as an owner!'
          PermissionDenied: '&cYou aren\'t allowed to add owners in this protection!'
          Unknown: '&cAn unknown error happened while trying to add this owner. Please
            contact with an administrator!'
      blocks: 
        delete: 
          PermissionDenied: '&cYou aren\'t allowed to remove this protection block!'
          SQL: '&cThere was an error trying to delete this protection block from
            the database. Please contact with an administrator!'
          Unknown: '&cAn unknown error happened while trying to remove this protection
            block. Please contact with an administrator!'
        save: 
          PermissionDenied: '&cYou aren\'t allowed to save this protection block!'
          NameInUse: '&cThere\'s already a protection block using this name!'
          SQL: '&cThere was an error trying to save this protection block in the
            database. Please contact with an administrator!'
          Unknown: '&cAn unknown error happened while trying to save this protection
            block. Please contact with an administrator!'
